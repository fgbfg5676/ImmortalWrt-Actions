name: Build OpenWrt for CM520-79F (Safe Precise Edition)

on:
  repository_dispatch:
  workflow_dispatch:

env:
  REPO_URL: https://github.com/immortalwrt/immortalwrt
  REPO_BRANCH: openwrt-24.10
  FEEDS_CONF: feeds.conf.default
  CONFIG_FILE: .config
  DIY_P1_SH: diy-part1.sh
  DIY_P2_SH: diy-part2.sh
  UPLOAD_BIN_DIR: false
  UPLOAD_FIRMWARE: true
  UPLOAD_RELEASE: true
  FILE_NAME: CM520-79F
  TZ: Asia/Shanghai
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 240
    permissions:
      actions: write
      contents: write

    steps:
    - name: Before freeing up disk space
      run: |
        echo "Before freeing up disk space"
        echo "=============================================================================="
        df -hT
        echo "=============================================================================="

    # ✅ 整合優勢：高級磁碟擴容，確保固若金湯
    - name: Maximize Build Space (Partition Expansion)
      uses: easimon/maximize-build-space@master
      with: 
        root-reserve-mb: 2048
        swap-size-mb: 1

    # ✅ 整合優勢：現代化空間優化器
    - name: Optimize Disk Space (hugoalh/disk-space-optimizer-ghaction)
      uses: hugoalh/disk-space-optimizer-ghaction@v0.8.1
      with:
        operate_sudo: "True"
        docker_include: ".+"
        docker_prune: "True"
        docker_clean: "True"
        apt_prune: "True"
        apt_clean: "True"
        homebrew_prune: "True"
        homebrew_clean: "True"
        npm_prune: "True"
        npm_clean: "True"
        os_swap: "True"

    - name: Free up disk space complete
      run: |
        echo "Free up disk space complete"
        echo "=============================================================================="
        df -hT
        echo "=============================================================================="

    - name: Checkout repository
      uses: actions/checkout@v4

    # ✅ 整合優勢：環境初始化清理
    - name: Initialization environment
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo apt-get clean
        sudo rm -rf /var/lib/apt/lists/*
        sudo rm -rf /etc/apt/sources.list.d/* /usr/local/lib/android /opt/ghc /usr/share/dotnet /usr/local/graalvm /usr/local/.ghcup \
        /usr/local/share/powershell /usr/local/share/chromium /usr/local/lib/node_modules
        
        sudo -E apt-get -qq update
        sudo -E apt-get -qq install $(curl -fsSL bit.ly/3AS48v1) xxd coreutils patch
        sudo -E apt-get -qq autoremove --purge
        sudo -E apt-get -qq clean
        sudo timedatectl set-timezone "$TZ"
        sudo chown $USER:$GROUPS $GITHUB_WORKSPACE

    # ✅ 核心對齊：純淨的 Go 1.26 容器環境
    - name: Setup Go (1.26.x)
      uses: actions/setup-go@v5
      with:
        go-version: '1.26.x'
        cache: false

    - name: Clone source code
      working-directory: ./
      run: |
        df -hT $PWD
        if [ -d openwrt ]; then rm -rf openwrt; fi
        git clone --depth=1 $REPO_URL -b $REPO_BRANCH openwrt
        cd openwrt
        echo "Current commit: $(git rev-parse HEAD)"
        useVersionInfo=$(git show -s --date=short --format="Author: %an<br/>date: %cd<br/>commit: %s<br/>commit hash: %H")
        echo "useVersionInfo=$useVersionInfo" >> $GITHUB_ENV
        echo "DATE=$(date "+%Y-%m-%d %H:%M:%S")" >> $GITHUB_ENV
        echo "DATE1=$(date "+%Y-%m-%d")" >> $GITHUB_ENV

    # ✅ 整合優勢：大版本與分支綁定的獨立緩存
    - name: Cache build (ccache)
      uses: stupidloud/cachewrtbuild@main
      with:
        ccache: 'true'
        prefix: ${{ github.workspace }}/openwrt
        mixkey: 'CM520-79F-${{ env.REPO_BRANCH }}-go126-v4'

    - name: Download and run create-banner.sh
      run: |
        wget -qO /tmp/create-banner.sh https://raw.githubusercontent.com/fgbfg5676/ImmortalWrt-Actions/main/create-banner.sh
        chmod +x /tmp/create-banner.sh
        bash /tmp/create-banner.sh

    - name: Debug banner package creation details
      run: |
        if [ -d "openwrt/package/custom/luci-app-banner" ]; then
          echo "✓ Banner package directory exists"
        else
          echo "✗ Banner package directory not found"
          exit 1
        fi

    - name: Run DIY part1 script
      run: |
        cd openwrt
        if [ -f "../$DIY_P1_SH" ]; then
          chmod +x "../$DIY_P1_SH"
          ../"$DIY_P1_SH"
        fi

    # ✅ 【重大改動：精準外科手術式對齊】
    # 徹底刪除了危險的全局 find + sed 暴力硬改
    # 改為：注入 26.x 官方核心 feeds，並精準鎖定 golang 倉庫自身的版本定義，0 風險、0 污染！
    - name: Add additional feeds & Precise Go Alignment
      run: |
        cd openwrt
        echo "src-git golang https://github.com/sbwml/packages_lang_golang;26.x" >> feeds.conf.default
        
        echo "=== 正在執行安全精準的 Go 核心版本對齊 ==="
        ./scripts/feeds update golang
        if [ -f "feeds/golang/lang/golang/Makefile" ]; then
          sed -i 's/GO_VERSION:=.*/GO_VERSION:=1.26.0/g' feeds/golang/lang/golang/Makefile
          echo "✓ 成功將 feeds/golang 核心版本精準對齊為 1.26.0"
        else
          echo "⚠️ 未找到 feeds/golang 路徑，將依靠 setup-go 容器和 26.x feeds 分支進行標準編譯"
        fi
        echo "=== 精準對齊完成 ==="

    - name: Update feeds
      run: cd openwrt && ./scripts/feeds update -a

    - name: Install feeds
      run: cd openwrt && ./scripts/feeds install -a

    - name: Copy custom configuration
      run: |
        cd openwrt
        if [ -f "../$CONFIG_FILE" ]; then
          cp "../$CONFIG_FILE" .config
        fi

    - name: Run DIY part2 script
      run: |
        cd openwrt
        if [ -f "../$DIY_P2_SH" ]; then
          chmod +x "../$DIY_P2_SH"
          ../"$DIY_P2_SH"
        fi

    - name: Generate final config and verify settings
      run: |
        cd openwrt
        if ! grep -q "CONFIG_PACKAGE_luci-app-banner=y" .config; then
          echo "CONFIG_PACKAGE_luci-app-banner=y" >> .config
        fi
        make defconfig

    - name: Download packages with retry
      id: package
      run: |
        cd openwrt
        make download -j8
        find dl -size -1024c -exec ls -l {} \;
        find dl -size -1024c -exec rm -f {} \;

    # ✅ 100% 純淨編譯：無監控、零干擾，出錯立刻降級單線程，不浪費時間
    - name: Build OpenWrt firmware
      id: compile
      run: |
        cd openwrt
        echo "========================================================"
        echo "🚀 全速編譯啟動（安全精準流 + 無監控純淨環境）"
        echo "========================================================"
        
        if make -j$(nproc); then
          grep '^CONFIG_TARGET.*DEVICE.*=y' .config | sed -r 's/.*DEVICE_(.*)=y/\1/' > DEVICE_NAME
          [ -s DEVICE_NAME ] && echo "DEVICE_NAME=_$(cat DEVICE_NAME)" >> $GITHUB_ENV
          echo "FILE_DATE=_$(date +"%Y%m%d%H%M")" >> $GITHUB_ENV
          echo "status=success" >> $GITHUB_OUTPUT
        else
          echo "========================================================"
          echo "⚠️ 多線程遭遇阻礙，立刻切換單線程安全降級 (make -j1 V=s)..."
          echo "========================================================"
          if make -j1 V=s; then
            grep '^CONFIG_TARGET.*DEVICE.*=y' .config | sed -r 's/.*DEVICE_(.*)=y/\1/' > DEVICE_NAME
            [ -s DEVICE_NAME ] && echo "DEVICE_NAME=_$(cat DEVICE_NAME)" >> $GITHUB_ENV
            echo "FILE_DATE=_$(date +"%Y%m%d%H%M")" >> $GITHUB_ENV
            echo "status=success" >> $GITHUB_OUTPUT
          else
            echo "status=failure" >> $GITHUB_OUTPUT
            exit 1
          fi
        fi

    - name: Check space usage
      if: (!cancelled())
      run: df -hT

    - name: Organize files
      id: organize
      if: steps.compile.outputs.status == 'success' && env.UPLOAD_FIRMWARE == 'true' && !cancelled()
      run: |
        cd openwrt/bin/targets/*/*
        rm -rf packages
        echo "FIRMWARE=$PWD" >> $GITHUB_ENV
        echo "status=success" >> $GITHUB_OUTPUT

    - name: Upload firmware artifact
      uses: actions/upload-artifact@v4
      if: steps.compile.outputs.status == 'success' && !cancelled()
      with:
        name: OpenWrt_${{ env.FILE_NAME }}_${{ env.DEVICE_NAME }}_${{ env.FILE_DATE }}
        path: ${{ env.FIRMWARE }}
        retention-days: 30

    - name: Ensure build log directory exists
      if: always()
      run: |
        mkdir -p openwrt/logs

    - name: Upload build logs and config
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: build-info_${{ env.FILE_DATE }}
        path: |
          openwrt/logs/
          openwrt/.config
          openwrt/bin/packages/
        retention-days: 7

    - name: Upload OpenWrt Firmware to Release
      id: release
      if: steps.compile.outputs.status == 'success' && env.UPLOAD_RELEASE == 'true' && !cancelled()
      uses: ncipollo/release-action@v1
      with:
        name: R${{ env.DATE }} for ${{ env.FILE_NAME }}
        allowUpdates: true
        removeArtifacts: true
        tag: ${{ env.FILE_NAME }}
        commit: main
        artifacts: ${{ env.FIRMWARE }}/*
        body: |
          - 默认IP：192.168.3.1 默认密码：无
          - 当前使用版本:【编译前的最后一次[➦主源码](https://github.com/immortalwrt/immortalwrt/tree/openwrt-24.10)更新記錄】
          ${{ env.useVersionInfo }}

    - name: Delete workflow runs
      uses: Mattraks/delete-workflow-runs@v2
      with:
        retain_days: 7
        keep_minimum_runs: 10

    - name: Remove old Releases
      uses: dev-drprasad/delete-older-releases@v0.3.4
      if: env.UPLOAD_RELEASE == 'true' && !cancelled()
      with:
        keep_latest: 3
        delete_tags: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

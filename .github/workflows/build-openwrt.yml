name: Build OpenWrt for CM520-79F

on:
  repository_dispatch:
  workflow_dispatch:
    inputs:
      ssh:
        description: 'SSH connection to Actions'
        required: false
        default: 'false'

env:
  REPO_URL: https://github.com/immortalwrt/immortalwrt
  REPO_BRANCH: openwrt-24.10
  FEEDS_CONF: feeds.conf.default
  CONFIG_FILE: .config
  DIY_P1_SH: diy-part1.sh
  DIY_P2_SH: diy-part2.sh
  UPLOAD_BIN_DIR: false
  UPLOAD_FIRMWARE: true
  UPLOAD_RELEASE: true
  FILE_NAME: CM520-79F
  TZ: Asia/Shanghai
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 240
    permissions:
      actions: write
      contents: write

    steps:
    - name: Before freeing up disk space
      run: |
        echo "Before freeing up disk space"
        echo "=============================================================================="
        df -hT
        echo "=============================================================================="

    - name: Maximize Build Space (Partition Expansion - Original Stable Config)
      uses: easimon/maximize-build-space@master
      with: 
        root-reserve-mb: 2048
        swap-size-mb: 1

    - name: Optimize Disk Space (hugoalh/disk-space-optimizer-ghaction)
      uses: hugoalh/disk-space-optimizer-ghaction@v0.8.1
      with:
        operate_sudo: "True"
        docker_include: ".+"
        docker_prune: "True"
        docker_clean: "True"
        apt_prune: "True"
        apt_clean: "True"
        homebrew_prune: "True"
        homebrew_clean: "True"
        npm_prune: "True"
        npm_clean: "True"
        os_swap: "True"

    - name: Free up disk space complete
      run: |
        echo "Free up disk space complete"
        echo "=============================================================================="
        df -hT
        echo "=============================================================================="

    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Initialization environment
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo apt-get clean
        # 🌟 核心修復：帶回你原版的核心清理命令，徹底乾失第三方源引起的 update 卡死
        sudo rm -rf /var/lib/apt/lists/*
        sudo rm -rf /etc/apt/sources.list.d/* /usr/local/lib/android /opt/ghc /usr/share/dotnet /usr/local/graalvm /usr/local/.ghcup \
        /usr/local/share/powershell /usr/local/share/chromium /usr/local/lib/node_modules
        
        sudo -E apt-get -qq update
        # 🌟 順手補上監控器必備的 psmisc 包
        sudo -E apt-get -qq install $(curl -fsSL bit.ly/3AS48v1) xxd coreutils patch psmisc
        sudo -E apt-get -qq autoremove --purge
        sudo -E apt-get -qq clean
        sudo timedatectl set-timezone "$TZ"
        sudo chown $USER:$GROUPS $GITHUB_WORKSPACE

    - name: Setup Go (1.26.x)
      uses: actions/setup-go@v5
      with:
        go-version: '1.26.x'
        cache: false

    - name: Clone source code
      working-directory: ./
      run: |
        df -hT $PWD
        if [ -d openwrt ]; then rm -rf openwrt; fi
        git clone --depth=1 $REPO_URL -b $REPO_BRANCH openwrt
        cd openwrt
        echo "Current commit: $(git rev-parse HEAD)"
        useVersionInfo=$(git show -s --date=short --format="Author: %an<br/>date: %cd<br/>commit: %s<br/>commit hash: %H")
        echo "useVersionInfo=$useVersionInfo" >> $GITHUB_ENV
        echo "DATE=$(date "+%Y-%m-%d %H:%M:%S")" >> $GITHUB_ENV
        echo "DATE1=$(date "+%Y-%m-%d")" >> $GITHUB_ENV

    - name: Cache build (ccache)
      uses: stupidloud/cachewrtbuild@main
      with:
        ccache: 'true'
        prefix: ${{ github.workspace }}/openwrt
        mixkey: 'CM520-79F-${{ env.REPO_BRANCH }}-go126-v2'

    - name: Download and run create-banner.sh
      run: |
        wget -qO /tmp/create-banner.sh https://raw.githubusercontent.com/fgbfg5676/ImmortalWrt-Actions/main/create-banner.sh
        chmod +x /tmp/create-banner.sh
        bash /tmp/create-banner.sh

    - name: Debug banner package creation details
      run: |
        echo "=== Detailed Banner Package Debug Information ==="
        if [ -d "openwrt/package/custom/luci-app-banner" ]; then
          echo "✓ Banner package directory exists"
        else
          echo "✗ Banner package directory not found"
          exit 1
        fi

    - name: Run DIY part1 script
      run: |
        cd openwrt
        if [ -f "../$DIY_P1_SH" ]; then
          chmod +x "../$DIY_P1_SH"
          ../"$DIY_P1_SH"
        fi

    - name: Add additional feeds
      run: |
        cd openwrt
        echo "src-git golang https://github.com/sbwml/packages_lang_golang;26.x" >> feeds.conf.default
        
        echo "=== 正在強制將源碼內部的 Go 版本篡改為 1.26 ==="
        find ./ -type f -name "*.mk" -exec sed -i 's/GO_VERSION:=1.25/GO_VERSION:=1.26/g' {} + 2>/dev/null || true
        find ./ -type f -name "Makefile" -exec sed -i 's/go1.25/go1.26/g' {} + 2>/dev/null || true
        
        if [ -f rules.mk ]; then
          sed -i 's/GO_VERSION:=.*/GO_VERSION:=1.26/g' rules.mk 2>/dev/null || true
        fi
        if [ -f include/host-build.mk ]; then
          sed -i 's/GO_VERSION:=.*/GO_VERSION:=1.26/g' include/host-build.mk 2>/dev/null || true
        fi
        echo "=== 源碼底層 Go 版本篡改完成 ==="

    - name: Update feeds
      run: cd openwrt && ./scripts/feeds update -a

    - name: Install feeds
      run: cd openwrt && ./scripts/feeds install -a

    - name: Copy custom configuration
      run: |
        cd openwrt
        if [ -f "../$CONFIG_FILE" ]; then
          cp "../$CONFIG_FILE" .config
        fi

    - name: Run DIY part2 script
      run: |
        cd openwrt
        if [ -f "../$DIY_P2_SH" ]; then
          chmod +x "../$DIY_P2_SH"
          ../"$DIY_P2_SH"
        fi

    - name: Generate final config and verify settings
      run: |
        cd openwrt
        if ! grep -q "CONFIG_PACKAGE_luci-app-banner=y" .config; then
          echo "CONFIG_PACKAGE_luci-app-banner=y" >> .config
        fi
        make defconfig

    - name: SSH connection to Actions
      uses: mxschmitt/action-tmate@v3
      if: (github.event.inputs.ssh == 'true' && github.event.inputs.ssh  != 'false') || contains(github.event.action, 'ssh')

    - name: Download packages with retry
      id: package
      run: |
        cd openwrt
        echo "=== 啟動全量高速並行下載 ==="
        make download -j8
        find dl -size -1024c -exec ls -l {} \;
        find dl -size -1024c -exec rm -f {} \;

    - name: Build OpenWrt firmware (Smart File & Load Tracking)
      id: compile
      run: |
        cd openwrt

        MAIN_PID=$$
        COMPILE_OK=false
        
        mkdir -p build_dir staging_dir tmp
        touch /tmp/watchdog_last

        (
          echo "=== 終極雙重監視器已啟動 ==="
          STUCK_COUNT=0

          while kill -0 $MAIN_PID 2>/dev/null; do
            sleep 60

            # 監控三個核心 I/O 目錄
            NEW_FILES_COUNT=$(find build_dir staging_dir tmp -maxdepth 4 -newer /tmp/watchdog_last 2>/dev/null | wc -l)
            touch /tmp/watchdog_last

            if [ "$NEW_FILES_COUNT" -eq 0 ]; then
              STUCK_COUNT=$((STUCK_COUNT + 1))
              
              LOAD1=$(awk '{print $1}' /proc/loadavg)

              # 0.25 完美平衡線
              if awk "BEGIN{exit !($LOAD1 > 0.25)}"; then
                echo "🔥 [提示] 當前無文件增量，但 LoadAvg ($LOAD1 > 0.25) 顯示 CPU 活躍，編譯鏈仍在高效運轉..."
                [ "$STUCK_COUNT" -gt 5 ] && STUCK_COUNT=5
              else
                echo "⚠️ [警告] 當前監控目錄無增量且 LoadAvg ($LOAD1 < 0.25) 顯示系統空閒！"
                
                if [ "$STUCK_COUNT" -ge 30 ] && [ "$STUCK_COUNT" -lt 60 ]; then
                  echo "========================================================"
                  echo "🚨 [疑似卡死] 連續 30 分鐘無磁碟寫入且 CPU 負載低於安全線！"
                  echo "📊 當前系統負載: $LOAD1 | 檢查時間: $(date '+%Y-%m-%d %H:%M:%S')"
                  echo "========================================================"
                fi

                if [ "$STUCK_COUNT" -ge 60 ]; then
                  echo "========================================================"
                  echo "❌ [死鎖確診] 滿 60 分鐘無增量且 CPU 處於絕對死寂狀態 ($LOAD1)！"
                  echo "🛑 強行終止主進程，準備切換單線程降級救磚！"
                  echo "========================================================"
                  kill $MAIN_PID 2>/dev/null || true
                  exit 1
                fi
              fi
            else
              STUCK_COUNT=0
            fi
          done
          echo "=== 監視器安全退出 ==="
        ) &
        MONITOR_PID=$!

        echo "========================================================"
        echo "🚀 滿血編譯啟動（全路徑 I/O + 0.25 負載控線完美護航）"
        echo "========================================================"

        if make -j$(nproc); then
          COMPILE_OK=true
        else
          echo "========================================================"
          echo "⚠️  多線程編譯異常，正在清理監視器，準備單線程降級救磚..."
          echo "========================================================"
          kill $MONITOR_PID 2>/dev/null || true

          echo "🔧 第二階段：單線程救磚模式 (make -j1 V=s)"
          if make -j1 V=s; then
            COMPILE_OK=true
          else
            COMPILE_OK=false
          fi
        fi

        kill $MONITOR_PID 2>/dev/null || true

        if [ "$COMPILE_OK" = "true" ]; then
          grep '^CONFIG_TARGET.*DEVICE.*=y' .config | sed -r 's/.*DEVICE_(.*)=y/\1/' > DEVICE_NAME
          [ -s DEVICE_NAME ] && echo "DEVICE_NAME=_$(cat DEVICE_NAME)" >> $GITHUB_ENV
          echo "FILE_DATE=_$(date +"%Y%m%d%H%M")" >> $GITHUB_ENV
          echo "status=success" >> $GITHUB_OUTPUT
        else
          echo "status=failure" >> $GITHUB_OUTPUT
          exit 1
        fi

    - name: Automatically Trigger SSH on Compilation Failure
      uses: mxschmitt/action-tmate@v3
      if: failure()
      timeout-minutes: 30
      with:
        limit-access-to-actor: true

    - name: Check space usage
      if: (!cancelled())
      run: df -hT

    - name: Organize files
      id: organize
      if: steps.compile.outputs.status == 'success' && env.UPLOAD_FIRMWARE == 'true' && !cancelled()
      run: |
        cd openwrt/bin/targets/*/*
        rm -rf packages
        echo "FIRMWARE=$PWD" >> $GITHUB_ENV
        echo "status=success" >> $GITHUB_OUTPUT

    - name: Upload firmware artifact
      uses: actions/upload-artifact@v4
      if: steps.compile.outputs.status == 'success' && !cancelled()
      with:
        name: OpenWrt_${{ env.FILE_NAME }}_${{ env.DEVICE_NAME }}_${{ env.FILE_DATE }}
        path: ${{ env.FIRMWARE }}
        retention-days: 30

    - name: Ensure build log directory exists
      if: always()
      run: |
        mkdir -p openwrt/logs

    - name: Upload build logs and config
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: build-info_${{ env.FILE_DATE }}
        path: |
          openwrt/logs/
          openwrt/.config
        retention-days: 7

    - name: Upload OpenWrt Firmware to Release
      id: release
      if: steps.compile.outputs.status == 'success' && env.UPLOAD_RELEASE == 'true' && !cancelled()
      uses: ncipollo/release-action@v1
      with:
        name: R${{ env.DATE }} for ${{ env.FILE_NAME }}
        allowUpdates: true
        removeArtifacts: true
        tag: ${{ env.FILE_NAME }}
        commit: main
        artifacts: ${{ env.FIRMWARE }}/*
        body: |
          - 默认IP：192.168.3.1 默认密码：无
          - 当前使用版本:【编译前的最后一次[➦主源码](https://github.com/immortalwrt/immortalwrt/tree/openwrt-24.10)更新記錄】
          ${{ env.useVersionInfo }}

    - name: Delete workflow runs
      uses: Mattraks/delete-workflow-runs@v2
      with:
        retain_days: 7
        keep_minimum_runs: 10

    - name: Remove old Releases
      uses: dev-drprasad/delete-older-releases@v0.3.4
      if: env.UPLOAD_RELEASE == 'true' && !cancelled()
      with:
        keep_latest: 3
        delete_tags: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

name: Build OpenWrt for CM520-79F

on:
  workflow_dispatch:

env:
  REPO_URL: https://github.com/immortalwrt/immortalwrt
  REPO_BRANCH: openwrt-24.10
  CONFIG_FILE: .config
  DIY_P1_SH: diy-part1.sh
  DIY_P2_SH: diy-part2.sh
  FILE_NAME: CM520-79F
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 240
    permissions:
      actions: write
      contents: write

    steps:
    - name: 释放磁盘空间
      run: |
        echo "=== 清理前 ==="
        df -hT
        # 预装大目录
        sudo rm -rf /usr/share/dotnet
        sudo rm -rf /usr/local/lib/android
        sudo rm -rf /opt/ghc
        sudo rm -rf /opt/hostedtoolcache
        sudo rm -rf /usr/local/share/boost
        sudo rm -rf /usr/lib/jvm
        sudo rm -rf /usr/share/swift
        sudo rm -rf /usr/local/share/chromium
        sudo rm -rf /usr/share/miniconda
        sudo rm -rf /usr/local/share/powershell
        sudo rm -rf /usr/local/lib/node_modules
        sudo rm -rf /usr/lib/google-cloud-sdk
        sudo rm -rf /usr/lib/mono
        sudo rm -rf /var/lib/snapd
        sudo rm -rf /snap
        # Docker
        sudo docker image prune -af 2>/dev/null || true
        sudo docker system prune -af 2>/dev/null || true
        # 预装软件包（OpenWrt编译用不到的）
        sudo apt-get remove -y \
          azure-cli google-cloud-cli microsoft-edge-stable google-chrome-stable \
          firefox mono-devel libgl1-mesa-dri snapd 2>/dev/null || true
        sudo apt-get autoremove -y 2>/dev/null || true
        sudo apt-get clean
        sudo rm -rf /tmp/apt-dpkg-install-* 2>/dev/null || true
        sudo rm -rf /var/cache/apt/archives/*.deb 2>/dev/null || true
        echo "=== 清理后 ==="
        df -hT

    - name: Optimize Disk Space
      uses: hugoalh/disk-space-optimizer-ghaction@v0.8.1
      with:
        operate_sudo: "True"

    - name: 确认磁盘空间
      run: |
        echo "=== 最终可用空间 ==="
        df -hT
        # 低于30GB则报警
        AVAIL=$(df / | awk 'NR==2{print $4}')
        if [ "$AVAIL" -lt 31457280 ]; then
          echo "[WARNING] 可用空间不足30GB，编译可能失败"
        else
          echo "[OK] 可用空间充足"
        fi

    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install build dependencies
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo -E apt-get -qq update
        sudo -E apt-get -qq install $(curl -fsSL bit.ly/3AS48v1) xxd coreutils
        sudo -E apt-get -qq autoremove --purge
        sudo -E apt-get -qq clean
        sudo timedatectl set-timezone "$TZ"

    - name: Setup Go (1.25.x)
      uses: actions/setup-go@v5
      with:
        go-version: '1.25.x'

    - name: Verify Go version
      run: |
        GO_VER=$(go version | awk '{print $3}')
        if [[ "$GO_VER" != go1.25.* ]]; then
          echo "[ERROR] Go version mismatch. Required: go1.25.x, Found: $GO_VER"
          exit 1
        else
          echo "[SUCCESS] Go version OK: $GO_VER"
        fi

    - name: Clone ImmortalWrt source
      run: |
        if [ -d openwrt ]; then rm -rf openwrt; fi
        git clone --depth=1 -b $REPO_BRANCH $REPO_URL openwrt
        cd openwrt
        echo "Current commit: $(git rev-parse HEAD)"

    - name: Download and run create-banner.sh
      run: |
        wget -qO /tmp/create-banner.sh https://raw.githubusercontent.com/fgbfg5676/ImmortalWrt-Actions/main/create-banner.sh
        chmod +x /tmp/create-banner.sh
        bash /tmp/create-banner.sh

    - name: Verify banner package
      run: |
        echo "=== Banner Package Verification ==="
        if [ -d "openwrt/package/custom/luci-app-banner" ]; then
          echo "✓ Banner package directory exists"
          find openwrt/package/custom/luci-app-banner -type f | sort
          echo ""
          echo "Makefile preview:"
          head -30 openwrt/package/custom/luci-app-banner/Makefile
          if [ -f "openwrt/package/custom/luci-app-banner/default/bg_default.jpg" ]; then
            echo "✓ bg_default.jpg exists ($(wc -c < openwrt/package/custom/luci-app-banner/default/bg_default.jpg) bytes)"
          else
            echo "✗ bg_default.jpg not found"
          fi
          if [ -f "openwrt/package/custom/luci-app-banner/default/banner_default.json" ]; then
            echo "✓ banner_default.json exists"
            cat openwrt/package/custom/luci-app-banner/default/banner_default.json
          else
            echo "✗ banner_default.json not found"
          fi
        else
          echo "✗ Banner package directory NOT found"
          ls -la openwrt/package/custom/ 2>/dev/null || echo "No custom packages found"
          exit 1
        fi

    - name: Run DIY part1 script
      run: |
        cd openwrt
        if [ -f "../$DIY_P1_SH" ]; then
          chmod +x "../$DIY_P1_SH"
          "../$DIY_P1_SH"
        fi

    - name: Add additional feeds
      run: |
        cd openwrt
        echo "src-git golang https://github.com/sbwml/packages_lang_golang;25.x" >> feeds.conf.default

    - name: Update feeds
      run: cd openwrt && ./scripts/feeds update -a

    - name: Install feeds
      run: cd openwrt && ./scripts/feeds install -a

    - name: Copy custom configuration
      run: |
        cd openwrt
        if [ -f "../$CONFIG_FILE" ]; then
          cp "../$CONFIG_FILE" .config
        else
          make defconfig
        fi

    - name: Run DIY part2 script
      run: |
        cd openwrt
        if [ -f "../$DIY_P2_SH" ]; then
          chmod +x "../$DIY_P2_SH"
          "../$DIY_P2_SH"
        fi

    - name: Generate final config and verify banner
      run: |
        cd openwrt

        if ! grep -q "CONFIG_PACKAGE_luci-app-banner=y" .config; then
          echo "Adding luci-app-banner to config..."
          echo "CONFIG_PACKAGE_luci-app-banner=y" >> .config
        fi

        make defconfig

        if grep -q "CONFIG_PACKAGE_luci-app-banner=y" .config; then
          echo "✓ Banner package confirmed in final config"
        else
          echo "Banner package missing after defconfig, adding again..."
          echo "CONFIG_PACKAGE_luci-app-banner=y" >> .config
          make defconfig
          grep -q "CONFIG_PACKAGE_luci-app-banner=y" .config \
            && echo "✓ Banner package now in config" \
            || { echo "✗ Banner package still missing - dependency issue"; exit 1; }
        fi

        echo "=== Configuration Summary ==="
        echo "Total enabled packages: $(grep -c "^CONFIG_PACKAGE.*=y" .config)"
        echo "LuCI packages enabled: $(grep -c "^CONFIG_PACKAGE_luci-.*=y" .config)"

    - name: Download packages
      run: |
        cd openwrt
        make download -j8
        find dl -size -1024c -exec rm -f {} \;

    - name: Build OpenWrt firmware
      run: |
        cd openwrt
        echo "Starting build process..."
        make -j$(nproc) || make -j1 || make -j1 V=s

        echo "=== Build Summary ==="
        echo "Total packages built: $(find bin/packages -name "*.ipk" 2>/dev/null | wc -l)"
        echo "LuCI packages: $(find bin/packages -name "luci-*" 2>/dev/null | wc -l)"
        find bin -name "*luci-app-banner*" -type f 2>/dev/null \
          && echo "✓ Banner package found in output" \
          || echo "Banner integrated into firmware image"

    - name: Prepare outputs
      run: |
        cd openwrt
        DEVICE_NAME=$(grep '^CONFIG_TARGET.*DEVICE.*=y' .config | sed -r 's/.*DEVICE_(.*)=y/\1/' | head -1)
        DEVICE_NAME=${DEVICE_NAME:-unknown}
        echo "DEVICE_NAME=$DEVICE_NAME" >> $GITHUB_ENV
        echo "FILE_DATE=$(date +'%Y%m%d-%H%M')" >> $GITHUB_ENV

    - name: Upload firmware artifact
      uses: actions/upload-artifact@v4
      with:
        name: OpenWrt_${{ env.FILE_NAME }}_${{ env.DEVICE_NAME }}_${{ env.FILE_DATE }}
        path: openwrt/bin/targets/*/*
        retention-days: 30

    - name: Upload build logs and config
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: build-info_${{ env.FILE_DATE }}
        path: |
          openwrt/logs/
          openwrt/.config
          openwrt/bin/packages/
        retention-days: 7

    - name: 清理编译中间文件
      if: always()
      run: |
        echo "=== 清理编译中间文件 ==="
        rm -rf $GITHUB_WORKSPACE/openwrt/build_dir 2>/dev/null || true
        rm -rf $GITHUB_WORKSPACE/openwrt/staging_dir 2>/dev/null || true
        echo "=== 清理后磁盘状态 ==="
        df -hT

name: Build OpenWrt for CM520-79F

on:
  repository_dispatch:
  workflow_dispatch:
    inputs:
      ssh:
        description: 'SSH connection to Actions'
        required: false
        default: 'false'

env:
  REPO_URL: https://github.com/immortalwrt/immortalwrt
  REPO_BRANCH: openwrt-24.10
  FEEDS_CONF: feeds.conf.default
  CONFIG_FILE: .config
  DIY_P1_SH: diy-part1.sh
  DIY_P2_SH: diy-part2.sh
  UPLOAD_BIN_DIR: false
  UPLOAD_FIRMWARE: true
  UPLOAD_RELEASE: true
  FILE_NAME: CM520-79F
  TZ: Asia/Shanghai
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 240
    permissions:
      actions: write
      contents: write

    steps:
    - name: Before freeing up disk space
      run: |
        echo "Before freeing up disk space"
        echo "=============================================================================="
        df -hT
        echo "=============================================================================="

    - name: Maximize Build Space
      uses: easimon/maximize-build-space@master
      with:
        root-reserve-mb: 2048
        swap-size-mb: 1
        remove-dotnet: 'true'
        remove-android: 'true'
        remove-haskell: 'true'
        remove-codeql: 'true'

    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Initialization environment & Free Space
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo apt-get clean
        sudo rm -rf /var/lib/apt/lists/*
        sudo rm -rf /etc/apt/sources.list.d/* /usr/local/lib/android /opt/ghc /usr/share/dotnet /usr/local/graalvm /usr/local/.ghcup \
        /usr/local/share/powershell /usr/local/share/chromium /usr/local/lib/node_modules

        sudo -E apt-get -qq update
        sudo -E apt-get -qq install $(curl -fsSL bit.ly/3AS48v1) xxd coreutils patch psmisc
        sudo -E apt-get -qq autoremove --purge
        sudo -E apt-get -qq clean
        sudo timedatectl set-timezone "$TZ"
        sudo chown $USER:$GROUPS $GITHUB_WORKSPACE

    - name: Free up disk space complete
      run: |
        echo "Free up disk space complete"
        echo "=============================================================================="
        df -hT
        echo "=============================================================================="

    - name: Setup Go (1.26.x)
      uses: actions/setup-go@v5
      with:
        go-version: '1.26.x'
        cache: false

    - name: Verify Go version
      run: |
        GO_VER=$(go version | awk '{print $3}')
        if [[ "$GO_VER" != go1.26.* ]]; then
          echo "[ERROR] Go version mismatch. Required: go1.26.x, Found: $GO_VER"
          exit 1
        else
          echo "[SUCCESS] Go version OK: $GO_VER"
        fi

    - name: Clone source code
      working-directory: ./
      run: |
        df -hT $PWD
        if [ -d openwrt ]; then rm -rf openwrt; fi
        git clone --depth=1 $REPO_URL -b $REPO_BRANCH openwrt
        cd openwrt
        echo "Current commit: $(git rev-parse HEAD)"
        
        echo "useVersionInfo<<EOF" >> $GITHUB_ENV
        git show -s --date=short --format="作者: %an<br/>日期: %cd<br/>提交分支: %s<br/>哈希校驗: %H" >> $GITHUB_ENV
        echo "EOF" >> $GITHUB_ENV
        
        echo "DATE=$(date "+%Y-%m-%d %H:%M:%S")" >> $GITHUB_ENV
        echo "DATE1=$(date "+%Y-%m-%d")" >> $GITHUB_ENV

    - name: Cache build (ccache)
      uses: stupidloud/cachewrtbuild@main
      with:
        ccache: 'true'
        prefix: ${{ github.workspace }}/openwrt
        mixkey: 'CM520-79F-go126-v2'

    - name: Download and run create-banner.sh
      run: |
        wget -qO /tmp/create-banner.sh https://raw.githubusercontent.com/fgbfg5676/ImmortalWrt-Actions/main/create-banner.sh
        chmod +x /tmp/create-banner.sh
        bash /tmp/create-banner.sh

    - name: Debug banner package creation details
      run: |
        if [ -d "openwrt/package/custom/luci-app-banner" ]; then
          echo "✓ Banner package directory exists"
        else
          echo "✗ Banner package directory not found"
          exit 1
        fi

    - name: Run DIY part1 script
      run: |
        cd openwrt
        if [ -f "../$DIY_P1_SH" ]; then
          chmod +x "../$DIY_P1_SH"
          ../"$DIY_P1_SH"
        fi

    - name: Add additional feeds
      run: |
        cd openwrt
        echo "src-git golang https://github.com/sbwml/packages_lang_golang;26.x" >> feeds.conf.default

    - name: Update feeds
      run: cd openwrt && ./scripts/feeds update -a

    - name: Install feeds
      run: cd openwrt && ./scripts/feeds install -a

    - name: Copy custom configuration
      run: |
        cd openwrt
        if [ -f "../$CONFIG_FILE" ]; then
          cp "../$CONFIG_FILE" .config
        fi

    - name: Verify banner package in config
      run: |
        cd openwrt
        if ! grep -q "CONFIG_PACKAGE_luci-app-banner=y" .config; then
          echo "CONFIG_PACKAGE_luci-app-banner=y" >> .config
        fi

    - name: Run DIY part2 script
      run: |
        cd openwrt
        if [ -f "../$DIY_P2_SH" ]; then
          chmod +x "../$DIY_P2_SH"
          ../"$DIY_P2_SH"
        fi

    - name: Generate final config
      run: |
        cd openwrt
        make defconfig

    - name: SSH connection to Actions
      uses: mxschmitt/action-tmate@v3
      if: (github.event.inputs.ssh == 'true' && github.event.inputs.ssh  != 'false') || contains(github.event.action, 'ssh')

    # 🌟 唯一保留的高速全量並行下載（所有依賴包和 ath10k 固件在此全量秒下齊）
    - name: Download packages
      run: |
        cd openwrt
        make defconfig
        echo "=== 啟動全量高速並行下載 ==="
        make download -j8
        find dl -size -1024c -exec ls -l {} \;
        find dl -size -1024c -exec rm -f {} \;

    # 大編譯：進程樹全透明追踪版
    - name: Build OpenWrt firmware (Dynamic Transparent Tracking)
      id: compile
      run: |
        cd openwrt

        COMPILE_LOG="$(pwd)/compile_raw.log"
        touch "$COMPILE_LOG"
        MAIN_PID=$$
        COMPILE_OK=false

        # 後台指紋監視器（僅在第一階段多線程有效）
        (
          echo "=== 動態指紋監視器已啟動 ==="
          LAST_MD5=""
          STUCK_COUNT=0

          while kill -0 $MAIN_PID 2>/dev/null; do
            sleep 60

            CURRENT_MD5=$(tail -n 20 "$COMPILE_LOG" 2>/dev/null | md5sum | awk '{print $1}')

            if [ "$CURRENT_MD5" = "$LAST_MD5" ] && [ -n "$CURRENT_MD5" ]; then
              STUCK_COUNT=$((STUCK_COUNT + 1))

              # ⏱️ 停滯 10~29 分鐘：打印系統負載探针
              if [ "$STUCK_COUNT" -ge 10 ] && [ "$STUCK_COUNT" -lt 30 ]; then
                echo "========================================================"
                echo "⚠️  [警告] 編譯日誌已停滯 $STUCK_COUNT 分鐘未發生過渡"
                echo "📊 負載(Load Avg): $(cat /proc/loadavg | awk '{print $1,$2,$3}')"
                echo "💽 磁碟剩餘: $(df -h / | awk 'NR==2 {print $4}')"
                echo "💡 說明底層仍在處理或打包，請耐心等待..."
                echo "========================================================"
              fi

              # 🚨 停滯滿 30 分鐘：不跳 SSH，直接打印當前本地處理/打包的具體進程樹
              if [ "$STUCK_COUNT" -ge 30 ]; then
                echo "========================================================"
                echo "🚨 [核心警告] 編譯日誌已絕對靜止滿 30 分鐘未發生過渡！"
                echo "📊 正在強行剝離底層進程外殼，捕獲當前處理進程樹詳情..."
                echo "========================================================"
                echo "⏱️  當前時間: $(date '+%Y-%m-%d %H:%M:%S')"
                echo "📊 系統負載: $(cat /proc/loadavg | awk '{print $1,$2,$3}')"
                
                echo -e "\n🌳 [進程樹拓撲]（顯示當前死磕的具體打包/編譯鏈）："
                if command -v pstree >/dev/null 2>&1; then
                  pstree -a -p $MAIN_PID
                else
                  ps -ef --forest | grep -E "$MAIN_PID|make" | grep -v grep
                fi
                
                echo -e "\n🔍 [詳細行為審計]（查看正在啃什麼細碎文件包）："
                ps -ef | grep -E "make|gcc|g++|clang" | grep -v grep | awk '{print "👉 PID:",$2,"| 狀態:",$8,"| 执行命令:",$0}' | cut -c1-200
                echo "========================================================"
                echo "💡 提示：進程詳情已保留，監視器已重置。主進程繼續，請保持耐心..."
                echo "========================================================"
                STUCK_COUNT=0
              fi
            else
              STUCK_COUNT=0
              LAST_MD5="$CURRENT_MD5"
            fi
          done
          echo "=== 多線程階段結束，監視器安全退出 ==="
        ) &
        MONITOR_PID=$!

        echo "========================================================"
        echo "🚀 第一階段：多線程並行編譯啟動（動態指紋監控中）"
        echo "========================================================"

        if make -j$(nproc) 2>&1 | tee "$COMPILE_LOG"; then
          COMPILE_OK=true
        else
          echo "========================================================"
          echo "⚠️  多線程編譯失敗，正在清理監視器與臨時日誌，準備降級..."
          echo "========================================================"
          kill $MONITOR_PID 2>/dev/null || true
          rm -f "$COMPILE_LOG"

          echo "🔧 第二階段：單線程救磚模式 (make -j1 V=s)"
          if make -j1 V=s; then
            COMPILE_OK=true
          else
            COMPILE_OK=false
          fi
        fi

        kill $MONITOR_PID 2>/dev/null || true
        rm -f "$COMPILE_LOG"

        if [ "$COMPILE_OK" = "true" ]; then
          grep '^CONFIG_TARGET.*DEVICE.*=y' .config | sed -r 's/.*DEVICE_(.*)=y/\1/' > DEVICE_NAME
          [ -s DEVICE_NAME ] && echo "DEVICE_NAME=_$(cat DEVICE_NAME)" >> $GITHUB_ENV
          echo "FILE_DATE=_$(date +"%Y%m%d%H%M")" >> $GITHUB_ENV
          echo "status=success" >> $GITHUB_OUTPUT
        else
          echo "status=failure" >> $GITHUB_OUTPUT
          exit 1
        fi

    # 唯一合法 SSH 攔截點：只有當多線程、單線程救磚全部徹底完蛋時觸發。30 分鐘超時防呆。
    - name: Automatically Trigger SSH on Compilation Failure
      uses: mxschmitt/action-tmate@v3
      if: failure()
      timeout-minutes: 30
      with:
        limit-access-to-actor: true

    - name: Check space usage
      if: (!cancelled())
      run: df -hT

    - name: Organize files
      id: organize
      if: steps.compile.outputs.status == 'success' && env.UPLOAD_FIRMWARE == 'true' && !cancelled()
      run: |
        cd openwrt/bin/targets/*/*
        rm -rf packages
        echo "FIRMWARE=$PWD" >> $GITHUB_ENV
        echo "status=success" >> $GITHUB_OUTPUT

    - name: Upload firmware artifact
      uses: actions/upload-artifact@v4
      if: steps.compile.outputs.status == 'success' && !cancelled()
      with:
        name: OpenWrt_${{ env.FILE_NAME }}_${{ env.DEVICE_NAME }}_${{ env.FILE_DATE }}
        path: ${{ env.FIRMWARE }}
        retention-days: 30

    - name: Upload build logs and config
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: build-info_${{ env.FILE_DATE }}
        path: |
          openwrt/logs/
          openwrt/.config
        retention-days: 7

    - name: Upload OpenWrt Firmware to Release
      id: release
      if: steps.compile.outputs.status == 'success' && env.UPLOAD_RELEASE == 'true' && !cancelled()
      uses: ncipollo/release-action@v1
      with:
        name: R${{ env.DATE }} for ${{ env.FILE_NAME }}
        allowUpdates: true
        removeArtifacts: true
        tag: ${{ env.FILE_NAME }}
        commit: main
        artifacts: ${{ env.FIRMWARE }}/*
        body: |
          - 默认IP：192.168.3.1 默认密码：无
          - 当前使用版本:【编译前的最后一次更新記錄】
          ${{ env.useVersionInfo }}

    - name: Delete workflow runs
      uses: Mattraks/delete-workflow-runs@v2
      with:
        retain_days: 7
        keep_minimum_runs: 10

    - name: Remove old Releases
      uses: dev-drprasad/delete-older-releases@v0.3.4
      if: env.UPLOAD_RELEASE == 'true' && !cancelled()
      with:
        keep_latest: 3
        delete_tags: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
